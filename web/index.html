<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dark UI</title>

  <!-- AOS Scroll Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --bg: #050509;
      --card: #1a1a1a;
      --text: #e6e6e6;
      --accent: #4f8cff;
      --radius: 14px;
      --transition: 0.25s ease;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 18px var(--accent);
      animation: floatHeader 6s ease-in-out infinite;
    }

    @keyframes floatHeader {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 12px var(--accent);
    }

    nav a {
      margin-left: 24px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      opacity: 0.85;
      transition: var(--transition);
      position: relative;
    }

    nav a:hover {
      opacity: 1;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .color-toggle {
      display: flex;
      gap: 12px;
    }

    .color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      transition: var(--transition);
      box-shadow: 0 0 10px currentColor;
    }

    .color-btn:hover {
      transform: scale(1.2);
    }

    /* PARALLAX WRAPPER */
    .parallax {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }

    .parallax-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      will-change: transform;
      z-index: -2;
    }

    .layer-back {
      background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      opacity: 0.25;
    }

    .layer-mid {
      background-image: url("https://images.unsplash.com/photo-1500534314209-a25ddb2bd429");
      opacity: 0.18;
    }

    .layer-front {
      background-image: url("https://images.unsplash.com/photo-1500534623283-312aade485b7");
      opacity: 0.12;
    }

    /* HERO */
    .hero {
      position: relative;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
      padding-top: 140px; /* space for header */
      z-index: 1;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 18px var(--accent);
    }

    p {
      opacity: 0.85;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 26px;
      background: var(--accent);
      color: white;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
      box-shadow: 0 0 14px var(--accent);
    }

    .btn:hover {
      box-shadow: 0 0 26px var(--accent);
      transform: translateY(-3px);
    }

    /* GALLERY */
    .gallery {
      margin-top: 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 0 40px 120px;
    }

    .gallery img {
      width: 100%;
      border-radius: var(--radius);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: var(--transition);
    }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px var(--accent);
    }

    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
      }
      h1 {
        font-size: 2.4rem;
      }
      .gallery {
        padding: 0 20px 80px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Neon Landing</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>

    <div class="color-toggle">
      <div class="color-btn" style="background:#4f8cff" data-color="#4f8cff"></div>
      <div class="color-btn" style="background:#ff4fd8" data-color="#ff4fd8"></div>
      <div class="color-btn" style="background:#4dff91" data-color="#4dff91"></div>
      <div class="color-btn" style="background:#b44dff" data-color="#b44dff"></div>
    </div>
  </header>

  <!-- PARALLAX + HERO -->
  <section class="parallax">
    <div class="parallax-layer layer-back" data-speed="0.15"></div>
    <div class="parallax-layer layer-mid" data-speed="0.3"></div>
    <div class="parallax-layer layer-front" data-speed="0.45"></div>

    <div class="hero" data-aos="fade-up">
      <h1>Welcome to the Neon Experience</h1>
      <p>
        A sleek dark‑mode landing page with glowing neon accents, smooth animations,
        and scroll‑revealed visuals. Now with a fully animated parallax background.
      </p>
      <a class="btn" href="#gallery">Explore More</a>
    </div>
  </section>

  <!-- GALLERY -->
  <section id="gallery" class="gallery">
    <img data-aos="fade-up" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" />
    <img data-aos="fade-up" src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429" />
    <img data-aos="fade-up" src="https://images.unsplash.com/photo-1500534623283-312aade485b7" />
    <img data-aos="fade-up" src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429" />
  </section>

  <!-- AOS Script -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 900 });

    // Neon Color Toggle
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.documentElement.style.setProperty('--accent', btn.dataset.color);
      });
    });

    // Parallax Effect
    document.addEventListener("scroll", () => {
      const layers = document.querySelectorAll(".parallax-layer");
      const scrollTop = window.pageYOffset;

      layers.forEach(layer => {
        const speed = layer.getAttribute("data-speed");
        layer.style.transform = `translateY(${scrollTop * speed}px)`;
      });
    });
  </script>

</body>
</html>
