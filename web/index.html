<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dark UI</title>

  <!-- AOS Scroll Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --bg: #050509;
      --text: #e6e6e6;
      --accent: #4f8cff;
      --radius: 14px;
      --transition: 0.25s ease;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 18px var(--accent);
      animation: floatHeader 6s ease-in-out infinite;
    }

    @keyframes floatHeader {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      text-shadow: 0 0 12px var(--accent);
    }

    nav a {
      margin-left: 24px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      opacity: 0.85;
      transition: var(--transition);
    }

    nav a:hover {
      opacity: 1;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .color-toggle {
      display: flex;
      gap: 12px;
    }

    .color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      transition: var(--transition);
      box-shadow: 0 0 10px currentColor;
    }

    .color-btn:hover {
      transform: scale(1.2);
    }

    /* PARALLAX SECTION */
    .parallax-section {
      position: relative;
      height: 200vh; /* creates scroll space */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .parallax-bg {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      background-size: cover;
      background-position: center;
      z-index: -1;
      opacity: 0.35;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      text-align: center;
      padding: 160px 20px 0;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 18px var(--accent);
    }

    p {
      opacity: 0.85;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 26px;
      background: var(--accent);
      color: white;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
      box-shadow: 0 0 14px var(--accent);
    }

    .btn:hover {
      box-shadow: 0 0 26px var(--accent);
      transform: translateY(-3px);
    }

    /* GALLERY */
    .gallery {
      margin-top: 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 0 40px 120px;
    }

    .gallery img {
      width: 100%;
      border-radius: var(--radius);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: var(--transition);
    }

    .gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px var(--accent);
    }

    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
      }
      h1 {
        font-size: 2.4rem;
      }
      .gallery {
        padding: 0 20px 80px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Neon Landing</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>

    <div class="color-toggle">
      <div class="color-btn" style="background:#4f8cff" data-color="#4f8cff"></div>
      <div class="color-btn" style="background:#ff4fd8" data-color="#ff4fd8"></div>
      <div class="color-btn" style="background:#4dff91" data-color="#4dff91"></div>
      <div class="color-btn" style="background:#b44dff" data-color="#b44dff"></div>
    </div>
  </header>

  <!-- PARALLAX + HERO -->
