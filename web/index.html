<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dark UI</title>

  <!-- AOS Scroll Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --text: #e6e6e6;
      --accent: #4f8cff;
      --radius: 14px;
      --transition: 0.25s ease;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ---------------- HEADER ---------------- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;

      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);

      box-shadow: 0 0 18px var(--accent);
      animation: floatHeader 6s ease-in-out infinite;
    }

    @keyframes floatHeader {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 12px var(--accent);
    }

    nav a {
      margin-left: 24px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      opacity: 0.85;
      transition: var(--transition);
      position: relative;
    }

    nav a:hover {
      opacity: 1;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    /* Neon Color Toggle */
    .color-toggle {
      display: flex;
      gap: 12px;
    }

    .color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      transition: var(--transition);
      box-shadow: 0 0 10px currentColor;
    }

    .color-btn:hover {
      transform: scale(1.2);
    }

    /* ---------------- PARALLAX ---------------- */
    .parallax {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .parallax-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      will-change: transform;
    }

    .layer-back {
      background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      opacity: 0.25;
    }

    .layer-mid {
      background-image: url("https://images.unsplash.com/photo-1500534314209-a25ddb2bd429");
      opacity: 0.18;
    }

    .layer-front {
      background-image: url("https://images.unsplash.com/photo-1500534623283-312aade485b7");
      opacity: 0.12;
    }

    /* ---------------- HERO ---------------- */
    .hero {
      position: relative;
      padding-top: 180px;
      text-align: center;
      max-width: 800px;
      margin: auto;
      z-index: 10;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 18px var(--accent);
    }

    p {
      opacity: 0.85;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 26px;
      background: var(--accent);
      color: white;
      border-radius: var(--radius);
      text-decoration
