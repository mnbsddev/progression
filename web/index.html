<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Mode UI</title>

  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --text: #e6e6e6;
      --accent: #4f8cff;
      --accent-hover: #6ea2ff;
      --radius: 12px;
      --transition: 0.25s ease;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    nav a {
      margin-left: 20px;
      color: var(--text);
      text-decoration: none;
      opacity: 0.8;
      transition: var(--transition);
    }

    nav a:hover {
      opacity: 1;
      color: var(--accent);
    }

    .card {
      background: var(--card);
      padding: 32px;
      border-radius: var(--radius);
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      transition: var(--transition);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(0,0,0,0.55);
    }

    h1 {
      margin-top: 0;
      font-size: 2.2rem;
    }

    p {
      line-height: 1.6;
      opacity: 0.85;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: var(--accent);
      color: white;
      border-radius: var(--radius);
      text-decoration: none;
      transition: var(--transition);
      font-weight: 500;
    }

    .btn:hover {
      background: var(--accent-hover);
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">My Dark UI</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <div class="card">
      <h1>Welcome to the Dark Side</h1>
      <p>
        This is a sleek, modern dark‑mode interface built with clean HTML and CSS.
        Perfect for Vercel deployments, portfolios, dashboards, or landing pages.
      </p>
      <a class="btn" href="#">Get Started</a>
    </div>
  </div>
</body>
</html>
